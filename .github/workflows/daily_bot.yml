name: Daily Current Affairs Bot

on:
  schedule:
    # 6:00 AM IST = 12:30 AM UTC (start processing 1 hour before)
    - cron: '30 0 * * *'
    # 5:00 PM IST = 11:30 AM UTC (start processing 1 hour before)
    - cron: '30 11 * * *'

  # Allow manual trigger from GitHub website
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - quiz
          - both

# Force Node.js 24 to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-news:
    if: github.event.schedule == '30 1 * * *' || github.event.schedule == '30 0 * * *' || github.event.inputs.job_type == 'news' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GDRIVE_ENABLED: ${{ secrets.GDRIVE_FOLDER_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock google-api-python-client google-auth-httplib2 google-auth-oauthlib
      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Create Google Service Account file
        if: env.GDRIVE_ENABLED == 'true'
        run: |
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json
          ls -la service_account.json
          echo "File size: $(wc -c < service_account.json) bytes"

      - name: Run Morning News (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json
          SKIP_TELEGRAM: 'true'
        run: python main.py news

      - name: Wait for 7:00 AM IST posting time
        run: |
          # Current UTC time
          current_hour=$(date -u +"%H")
          current_min=$(date -u +"%M")
          current_total=$((current_hour * 60 + current_min))
          # Target: 01:30 UTC (7:00 AM IST) = 90 minutes
          target=90
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 7:00 AM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 7:00 AM IST, posting now..."
          fi

      - name: Post Morning News to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python -c "
import json
import os
from datetime import datetime
from content_generator import ContentGenerator
from telegram_poster import TelegramPoster, run_async

today = datetime.now().strftime('%Y-%m-%d')
filtered_file = f'data/filtered_news/filtered_{today}.json'
with open(filtered_file, 'r', encoding='utf-8') as f:
    filtered = json.load(f)

generator = ContentGenerator()
posts, post_data = generator.generate_all_posts(filtered)
poster = TelegramPoster()
ok, fail = run_async(poster.post_news(posts))
print(f'Posted: {ok} sent, {fail} failed')
"

      - name: Upload to Google Drive
        if: env.GDRIVE_ENABLED == 'true'
        run: python -c "from google_drive_uploader import GoogleDriveUploader; GoogleDriveUploader().upload_all_reports()"
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            logs/
          retention-days: 30

  evening-quiz:
    if: github.event.schedule == '30 12 * * *' || github.event.schedule == '30 11 * * *' || github.event.inputs.job_type == 'quiz' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GDRIVE_ENABLED: ${{ secrets.GDRIVE_FOLDER_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Create Google Service Account file
        if: env.GDRIVE_ENABLED == 'true'
        run: |
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json
          ls -la service_account.json
          echo "File size: $(wc -c < service_account.json) bytes"

      - name: Run Evening Quiz (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json
          SKIP_TELEGRAM: 'true'
        run: python main.py quiz

      - name: Wait for 6:00 PM IST posting time
        run: |
          # Current UTC time
          current_hour=$(date -u +"%H")
          current_min=$(date -u +"%M")
          current_total=$((current_hour * 60 + current_min))
          # Target: 12:30 UTC (6:00 PM IST) = 750 minutes
          target=750
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 6:00 PM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 6:00 PM IST, posting now..."
          fi

      - name: Post Evening Quiz to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python -c "
import json
import os
from datetime import datetime
from quiz_generator import QuizGenerator
from telegram_poster import TelegramPoster, run_async

today = datetime.now().strftime('%Y-%m-%d')
filtered_file = f'data/filtered_news/filtered_{today}.json'
with open(filtered_file, 'r', encoding='utf-8') as f:
    filtered = json.load(f)

quiz_gen = QuizGenerator()
questions = quiz_gen.generate_daily_quiz(filtered)
quiz_posts = quiz_gen.format_for_telegram(questions)
poster = TelegramPoster()
ok, fail = run_async(poster.post_quiz(quiz_posts))
print(f'Posted: {ok} sent, {fail} failed')
"

      - name: Upload to Google Drive
        if: env.GDRIVE_ENABLED == 'true'
        run: python -c "from google_drive_uploader import GoogleDriveUploader; GoogleDriveUploader().upload_all_reports()"
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quiz-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            data/quizzes/
            logs/
          retention-days: 30