name: Daily Current Affairs Bot

on:
  schedule:
    # 6:30 AM IST = 1:00 AM UTC (start processing 1 hour before)
    - cron: '0 1 * * *'
    # 5:30 PM IST = 12:00 PM UTC (start processing 1 hour before)
    - cron: '0 12 * * *'

  # Allow manual trigger from GitHub website
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - quiz
          - both

# Force Node.js 24 to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-news:
    if: github.event.schedule == '30 1 * * *' || github.event.schedule == '30 0 * * *' || github.event.inputs.job_type == 'news' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Run Morning News (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SKIP_TELEGRAM: 'true'
        run: python main.py news

      - name: Wait for 6:30 AM IST posting time
        run: |
          current_hour=$(date -u +"%H")
          current_min=$(date -u +"%M")
          current_total=$((current_hour * 60 + current_min))
          target=60
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 6:30 AM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 6:30 AM IST, posting now..."
          fi

      - name: Post Morning News to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py post-news

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            logs/
          retention-days: 30

  evening-quiz:
    if: github.event.schedule == '30 12 * * *' || github.event.schedule == '30 11 * * *' || github.event.inputs.job_type == 'quiz' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Run Evening Quiz (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SKIP_TELEGRAM: 'true'
        run: python main.py quiz

      - name: Wait for 5:30 PM IST posting time
        run: |
          current_hour=$(date -u +"%H")
          current_min=$(date -u +"%M")
          current_total=$((current_hour * 60 + current_min))
          target=690
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 5:30 PM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 5:30 PM IST, posting now..."
          fi

      - name: Post Evening Quiz to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py post-quiz

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quiz-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            data/quizzes/
            logs/
          retention-days: 30
