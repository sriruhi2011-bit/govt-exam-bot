name: Daily Current Affairs Bot

on:
  schedule:
    # 6:00 AM IST = 12:30 AM UTC (morning greeting)
    - cron: '30 0 * * *'
    # 7:00 AM IST = 1:30 AM UTC (morning news processing)
    - cron: '30 1 * * *'
    # 5:00 PM IST = 11:30 AM UTC (quiz processing - posts notification then quiz after 2 min)
    - cron: '30 11 * * *'
    # 9:00 PM IST = 3:30 PM UTC (good night message)
    - cron: '30 15 * * *'

  # Allow manual trigger from GitHub website
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - quiz
          - greeting
          - goodnight
          - both

# Force Node.js 24 to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-greeting:
    if: github.event.schedule == '30 0 * * *' || github.event.inputs.job_type == 'greeting' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Send Morning Greeting
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py greeting

  morning-news:
    if: github.event.schedule == '30 1 * * *' || github.event.inputs.job_type == 'news' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Clear cached files
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name '*.pyc' -delete 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Run Morning News (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SKIP_TELEGRAM: 'true'
        run: python main.py news

      - name: Wait for 5:30 AM IST posting time
        run: |
          current_hour=$(date -u +"%-H")
          current_min=$(date -u +"%-M")
          current_total=$((10#$current_hour * 60 + 10#$current_min))
          target=0
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 5:30 AM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 5:30 AM IST, posting now..."
          fi

      - name: Post Morning News to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py post-news

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: news-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            logs/
          retention-days: 30

  evening-quiz:
    if: github.event.schedule == '30 11 * * *' || github.event.inputs.job_type == 'quiz' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Clear cached files
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name '*.pyc' -delete 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Run Evening Quiz (Process Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SKIP_TELEGRAM: 'true'
        run: python main.py quiz

      - name: Wait for 5:00 PM IST posting time
        run: |
          current_hour=$(date -u +"%-H")
          current_min=$(date -u +"%-M")
          current_total=$((10#$current_hour * 60 + 10#$current_min))
          target=690
          wait_minutes=$((target - current_total))
          if [ $wait_minutes -gt 0 ]; then
            echo "Waiting $wait_minutes minutes for 5:00 PM IST..."
            sleep $((wait_minutes * 60))
          else
            echo "Already past 5:00 PM IST, posting now..."
          fi

      - name: Post Evening Quiz to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py post-quiz

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: quiz-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            data/quizzes/
            logs/
          retention-days: 30

  good-night:
    if: github.event.schedule == '30 15 * * *' || github.event.inputs.job_type == 'goodnight' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock

      - name: Send Good Night Message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py goodnight
