name: Daily Current Affairs Bot

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'

  # Allow manual trigger from GitHub website
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - quiz
          - both

# Force Node.js 24 to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-news:
    if: github.event.schedule == '30 1 * * *' || github.event.inputs.job_type == 'news' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GDRIVE_ENABLED: ${{ secrets.GDRIVE_FOLDER_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock google-api-python-client google-auth-httplib2 google-auth-oauthlib
      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Create Google Service Account file
        if: env.GDRIVE_ENABLED == 'true'
        run: |
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json
          ls -la service_account.json
          echo "File size: $(wc -c < service_account.json) bytes"

      - name: Run Morning News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json
        run: python main.py news

      - name: Upload to Google Drive
        if: env.GDRIVE_ENABLED == 'true'
        run: python -c "from google_drive_uploader import GoogleDriveUploader; GoogleDriveUploader().upload_all_reports()"
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            logs/
          retention-days: 30

  evening-quiz:
    if: github.event.schedule == '30 12 * * *' || github.event.inputs.job_type == 'quiz' || github.event.inputs.job_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GDRIVE_ENABLED: ${{ secrets.GDRIVE_FOLDER_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-telegram-bot==20.7 schedule lxml openpyxl xlsxwriter filelock google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create data directories
        run: |
          mkdir -p data/raw_news data/filtered_news data/quizzes data/excel_reports logs

      - name: Create Google Service Account file
        if: env.GDRIVE_ENABLED == 'true'
        run: |
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json
          ls -la service_account.json
          echo "File size: $(wc -c < service_account.json) bytes"

      - name: Run Evening Quiz
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json
        run: python main.py quiz

      - name: Upload to Google Drive
        if: env.GDRIVE_ENABLED == 'true'
        run: python -c "from google_drive_uploader import GoogleDriveUploader; GoogleDriveUploader().upload_all_reports()"
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: service_account.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quiz-report-${{ github.run_number }}
          path: |
            data/excel_reports/
            data/filtered_news/
            data/quizzes/
            logs/
          retention-days: 30